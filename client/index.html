<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="theme-color" content="#0A1320" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <script>
      (function () {
        var isTradePortal = window.location.pathname.indexOf("/trade-portal") === 0;
        var installSurface = isTradePortal
          ? {
              key: "trade-portal",
              title: "Trade Portal",
              manifest: "/trade-portal-manifest.json",
              icon: "/icons/trade-portal-icon-192.png"
            }
          : {
              key: "main",
              title: "Altaspan",
              manifest: "/manifest.json",
              icon: "/icons/icon-192.png"
            };

        window.__SPANLINE_INSTALL_SURFACE__ = installSurface;
        document.documentElement.dataset.installSurface = installSurface.key;

        var title = document.createElement("title");
        title.textContent = installSurface.title;
        document.head.appendChild(title);

        var appleTitle = document.createElement("meta");
        appleTitle.id = "install-apple-title";
        appleTitle.name = "apple-mobile-web-app-title";
        appleTitle.content = installSurface.title;
        document.head.appendChild(appleTitle);

        var manifest = document.createElement("link");
        manifest.id = "install-manifest";
        manifest.rel = "manifest";
        manifest.href = installSurface.manifest;
        document.head.appendChild(manifest);

        var icon = document.createElement("link");
        icon.id = "install-icon";
        icon.rel = "icon";
        icon.type = "image/png";
        icon.sizes = "192x192";
        icon.href = installSurface.icon;
        document.head.appendChild(icon);

        var appleIcon = document.createElement("link");
        appleIcon.id = "install-apple-icon";
        appleIcon.rel = "apple-touch-icon";
        appleIcon.sizes = "192x192";
        appleIcon.href = installSurface.icon;
        document.head.appendChild(appleIcon);
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      /* Inline loading screen - shows immediately before JS loads */
      #app-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0A1320;
        z-index: 99999;
        font-family: 'Poppins', system-ui, -apple-system, sans-serif;
        transition: opacity 0.3s ease-out;
      }
      #app-loader.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #app-loader .loader-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #1D2733;
        border-top-color: #C2A458;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      #app-loader .loader-text {
        margin-top: 16px;
        font-size: 14px;
        font-weight: 500;
        color: #F2EDE6;
        letter-spacing: -0.01em;
      }
      #app-loader .loader-brand {
        margin-bottom: 24px;
        font-size: 18px;
        font-weight: 600;
        color: #C2A458;
        letter-spacing: -0.02em;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>

  <body>
    <div id="app-loader">
      <div class="loader-brand">Altaspan</div>
      <div class="loader-spinner"></div>
      <div class="loader-text">Loading...</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>

</html>
